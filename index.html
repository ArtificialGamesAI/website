<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Artificial Games</title>
  <meta name="description" content="Artificial Games. We make games for AI to play.">
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    main {
      max-width: 760px;
      text-align: center;
    }

    img {
      max-width: 180px;
      height: auto;
      margin: 0 auto 24px;
      display: block;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      line-height: 1;
      letter-spacing: -0.03em;
      font-weight: 700;
    }

    p {
      margin: 0 0 14px;
      font-size: clamp(1.05rem, 2vw, 1.35rem);
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.9);
    }

    .email {
      margin-top: 26px;
      font-size: 1rem;
    }

    a {
      color: #fff;
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.35);
    }

    a:hover {
      border-bottom-color: rgba(255, 255, 255, 0.8);
    }
  </style>
</head>
<body>
  <main>
    <h1>Artificial Games</h1>
    <p>We make games for AI to play.</p>
    <p>Playable systems for artificial agents, for humans to watch, shape, understand and enjoy.</p>
    <p class="email"><a href="mailto:mark@artificialgames.ai">mark@artificialgames.ai</a></p>
  </main>
</body>
</html>
