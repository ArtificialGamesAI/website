<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Artificial Games</title>
<meta name="description" content="The interaction pattern is the company. Brief, watch, react, re-brief.">

<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" media="(prefers-color-scheme: light)">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32-dark.png" media="(prefers-color-scheme: dark)">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --surface: #F2F0EC;
  --ink: #0E0E0C;
  --ink-mid: #545450;
  --ink-faint: #8A8A84;
  --rule: #C8C6C0;
  --scar: #9A2E22;

  /* Layout — frame edge + outer padding match the deck */
  --frame-x: clamp(24px, 4vw, 64px);
  --frame-y: clamp(24px, 3vw, 48px);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--surface);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "kern" 1, "liga" 1;
}

body {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  padding: var(--frame-y) var(--frame-x);
}

/* All content centres in a column whose width matches the title's natural width */
.column {
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
}

/* ============ DOCUMENT HEADER ============ */
.doc-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--rule);
}

.ag-mark-header {
  display: flex;
  align-items: center;
  gap: 18px;
}

.ag-mark-header .monogram-stack {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

.ag-mark-header .monogram {
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: 32px;
  letter-spacing: -0.04em;
  line-height: 0.75;
  color: var(--ink);
}

.ag-mark-header .header-emdash {
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: 32px;
  letter-spacing: -0.04em;
  line-height: 0.2;
  color: var(--scar);
  display: block;
  margin-top: 1.3px; /* 0.04em × 32px */
}

.ag-mark-header .slug {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 400;
  font-size: 11px;
  letter-spacing: 0;
  color: var(--ink);
  align-self: center;
  padding-bottom: 4px;
}

.classification {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  font-size: 13px;
  letter-spacing: 0.04em;
  color: var(--scar);
  padding-top: 4px;
}

/* ============ SUBTITLE ============ */
.subtitle {
  margin-top: clamp(40px, 6vw, 56px);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 400;
  font-size: 13px;
  color: var(--ink-mid);
  letter-spacing: 0.01em;
}

.subtitle .label { color: var(--ink-faint); }
.subtitle .dot   { color: var(--ink-faint); margin: 0 12px; }

/* ============ TITLE + COVER EM-DASH + TAGLINE ============ */
.title {
  margin-top: 24px;
  font-family: 'Inter', sans-serif;
  font-weight: 400;
  font-size: clamp(56px, 10vw, 180px);
  line-height: 0.85;
  letter-spacing: -0.025em;
  color: var(--ink);
}

.cover-emdash {
  font-family: 'Inter', sans-serif;
  font-weight: 400;
  font-size: clamp(56px, 10vw, 180px);
  letter-spacing: -0.025em;
  line-height: 0.2;
  color: var(--scar);
  display: block;
  margin-top: 0.04em;
}

.tagline {
  margin-top: clamp(28px, 4vw, 40px);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 400;
  font-size: clamp(20px, 2.4vw, 36px);
  line-height: 1.4;
  color: var(--ink);
}

/* ============ SUBJECT SENTENCE ============ */
.subject {
  margin-top: clamp(40px, 5vw, 56px);
  font-family: 'Inter', sans-serif;
  font-weight: 400;
  font-size: clamp(18px, 1.9vw, 30px);
  line-height: 1.45;
  letter-spacing: -0.005em;
  color: var(--ink);
  max-width: 32ch;
}

/* ============ EMAIL ============ */
.contact {
  margin-top: clamp(28px, 3vw, 40px);
  font-family: 'Inter', sans-serif;
  font-weight: 400;
  font-size: clamp(16px, 1.4vw, 22px);
  line-height: 1.45;
  color: var(--ink);
}

.contact a {
  color: inherit;
  text-decoration: none;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 1px;
  transition: color 120ms ease, border-color 120ms ease;
}

.contact a:hover,
.contact a:focus-visible {
  color: var(--scar);
  border-bottom-color: var(--scar);
  outline: none;
}

/* ============ SPACER + FOOTER ============ */
.spacer { flex: 1; min-height: clamp(48px, 8vh, 120px); }

.footer {
  padding-top: 14px;
  border-top: 1px solid var(--rule);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px 32px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  letter-spacing: 0.01em;
}

.footer .field {
  display: flex;
  gap: 8px;
}

.footer .field .label { color: var(--ink-faint); }
.footer .field .value { color: var(--ink-mid); }

/* ============ MOBILE ADJUSTMENTS ============ */
@media (max-width: 720px) {
  .ag-mark-header .slug { display: none; }
  .footer { font-size: 11px; }
  .subtitle { font-size: 11px; }
}

@media (max-width: 480px) {
  .footer .field { flex-basis: 100%; }
}
</style>
</head>
<body>

  <header class="doc-header column">
    <div class="ag-mark-header">
      <div class="monogram-stack">
        <div class="monogram">AG</div>
        <span class="header-emdash">&mdash;</span>
      </div>
    </div>
    <div class="classification">External</div>
  </header>

  <main class="column">
    <div class="subtitle">
      <span class="label">Document:</span> 006b<span class="dot">·</span><span class="label">Context:</span> Website
    </div>

    <h1 class="title">Artificial Games</h1>
    <span class="cover-emdash" aria-hidden="true">&mdash;</span>
    <p class="tagline">Not you. Yours.</p>

    <p class="subject">The interaction pattern is the company.<br>Brief, watch, react, re-brief.</p>

    <p class="contact"><a href="mailto:mark@artificialgames.ai">mark@artificialgames.ai</a></p>
  </main>

  <div class="spacer"></div>

  <footer class="footer column">
    <div class="field">
      <span class="label">Who:</span>
      <span class="value">M. Sorrell, claude-opus-4-7, gpt-5.4</span>
    </div>
    <div class="field">
      <span class="label">When:</span>
      <span class="value">Apr 2026</span>
    </div>
    <div class="field">
      <span class="label">What:</span>
      <span class="value">interaction, pattern, briefing</span>
    </div>
  </footer>

</body>
</html>
